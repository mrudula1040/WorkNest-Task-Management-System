<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>WorkNest | Tasks</title>
    <link rel="stylesheet" th:href="@{/css/tasks.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/base.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="header">
        <h2 th:text="${title}">Tasks</h2>

        <!-- ✅ ADMIN OR MANAGER CAN ADD -->
        <a th:if="${session.user.role.name() == 'ADMIN'
                   or session.user.role.name() == 'MANAGER'}"
           th:href="@{/task/add}"
           class="btn-primary">
            + Add Task
        </a>
    </div>

    <form class="filter-bar" th:action="@{/tasks/search}" method="get">
        <input type="text" name="keyword"
               placeholder="Search title..."
               th:value="${param.keyword}">

        <select name="status">
            <option value="">All Status</option>
            <option value="TODO">To Do</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="DONE">Done</option>
        </select>

        <button type="submit" class="btn-filter">Filter</button>
    </form>

    <table>
        <thead>
        <tr>
            <th>Title</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Category</th>
            <th>Due Date</th>

            <!-- ✅ ONLY ADMIN SEE ASSIGNED -->
            <th th:if="${session.user.role.name() == 'ADMIN'}">
                Assigned To
            </th>

            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="task : ${tasks}">
            <td th:text="${task.title}"></td>

            <td>
                <span class="badge"
                      th:classappend="${task.status == 'DONE' ? 'done'
                      : (task.status == 'IN_PROGRESS' ? 'progress' : 'todo')}"
                      th:text="${task.status}">
                </span>
            </td>

            <td th:text="${task.priority}"></td>
            <td th:text="${task.category}"></td>
            <td th:text="${task.dueDate != null ? task.dueDate : 'No Date'}"></td>

            <!-- ✅ ADMIN ASSIGNED USER -->
            <td th:if="${session.user.role.name() == 'ADMIN'}">

                <span th:if="${task.assignedUserName == null}"
                      class="unassigned">
                    Unassigned
                </span>

                <a th:if="${task.assignedUserName != null}"
                   th:href="@{/admin/user/{id}/tasks(id=${task.assignedUserId})}"
                   th:text="${task.assignedUserName}"
                   class="user-link">
                </a>
            </td>

            <td class="actions">
                <a th:href="@{/task/edit/{id}(id=${task.taskId})}"
                   class="btn-edit">
                    Edit
                </a>

                <!-- ✅ DELETE ONLY ADMIN -->
                <a th:if="${session.user.role.name() == 'ADMIN'}"
                   th:href="@{/task/delete/{id}(id=${task.taskId})}"
                   class="btn-delete"
                   onclick="return confirm('Delete this task?')">
                    Delete
                </a>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(tasks)}">
            <td colspan="7" class="empty">
                No tasks found ☕
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
